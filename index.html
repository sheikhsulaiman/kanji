<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KANJI — N5 & N4 Reference</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --white: #f5f0e8;
    --yellow: #FFE000;
    --red: #FF2D00;
    --blue: #0047FF;
    --green: #00C853;
    --pink: #FF6EC7;
    --border: 3px solid var(--black);
    --shadow: 5px 5px 0px var(--black);
    --shadow-lg: 8px 8px 0px var(--black);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--white);
    color: var(--black);
    font-family: 'Space Mono', monospace;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: var(--black);
    color: var(--yellow);
    padding: 32px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 4px solid var(--yellow);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 5vw, 4rem);
    letter-spacing: 0.08em;
    line-height: 1;
  }
  header h1 span { color: var(--red); }
  .header-badge {
    font-size: 0.75rem;
    font-weight: 700;
    background: var(--yellow);
    color: var(--black);
    padding: 6px 12px;
    border: 2px solid var(--yellow);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* CONTROLS */
  .controls {
    padding: 24px 40px;
    background: var(--white);
    border-bottom: var(--border);
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  .tab-btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.05em;
    padding: 10px 28px;
    border: var(--border);
    background: var(--white);
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .tab-btn:hover { transform: translate(-2px,-2px); box-shadow: 7px 7px 0 var(--black); }
  .tab-btn.active.n5 { background: var(--yellow); }
  .tab-btn.active.n4 { background: var(--blue); color: var(--white); }
  .tab-btn.active.all { background: var(--red); color: var(--white); }

  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    padding: 10px 16px;
    border: var(--border);
    background: var(--white);
    box-shadow: var(--shadow);
    outline: none;
  }
  .search-wrap input:focus { box-shadow: 7px 7px 0 var(--black); }

  .count-badge {
    font-size: 0.75rem;
    font-weight: 700;
    background: var(--pink);
    color: var(--black);
    padding: 6px 12px;
    border: var(--border);
    white-space: nowrap;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 0;
    padding: 40px;
    gap: 24px;
  }

  /* CARD */
  .card {
    border: var(--border);
    background: var(--white);
    box-shadow: var(--shadow-lg);
    position: relative;
    transition: transform 0.15s, box-shadow 0.15s;
    overflow: hidden;
  }
  .card:hover {
    transform: translate(-4px, -4px);
    box-shadow: 12px 12px 0 var(--black);
  }
  .card.n5 { --accent: var(--yellow); }
  .card.n4 { --accent: var(--blue); }

  .card-top {
    background: var(--accent);
    padding: 20px 20px 12px;
    border-bottom: var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }
  .kanji-char {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 4rem;
    font-weight: 900;
    line-height: 1;
    color: var(--black);
  }
  .card-meta {
    text-align: right;
  }
  .level-tag {
    display: inline-block;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.05em;
    padding: 3px 10px;
    border: 2px solid var(--black);
    background: var(--black);
    color: var(--accent);
    margin-bottom: 4px;
  }
  .romaji {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--black);
    background: rgba(255,255,255,0.5);
    padding: 2px 6px;
    border: 1px solid var(--black);
    display: inline-block;
    max-width: 140px;
    text-align: center;
    word-break: break-word;
  }

  .card-body { padding: 16px 20px; }
  .meaning {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 0.04em;
    margin-bottom: 12px;
    color: var(--black);
    border-left: 4px solid var(--accent, var(--black));
    padding-left: 8px;
  }
  .words-label {
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #666;
    margin-bottom: 8px;
  }
  .words { display: flex; flex-direction: column; gap: 6px; }
  .word-item {
    display: flex;
    align-items: baseline;
    gap: 8px;
    font-size: 0.8rem;
    padding: 6px 10px;
    border: 2px solid var(--black);
    background: var(--white);
    position: relative;
  }
  .word-item::before {
    content: '→';
    font-weight: 700;
    color: var(--red);
    flex-shrink: 0;
  }
  .word-jp {
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
  }
  .word-rom {
    color: #555;
    font-size: 0.7rem;
    flex-shrink: 0;
  }
  .word-en {
    margin-left: auto;
    font-size: 0.7rem;
    font-weight: 700;
    text-align: right;
    color: var(--black);
  }

  /* No results */
  .no-results {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 20px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    color: #ccc;
  }

  /* STRIPE PATTERN bg elements */
  .stripe-bg {
    position: fixed;
    top: 0; right: 0;
    width: 200px; height: 100%;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 10px,
      rgba(0,0,0,0.03) 10px,
      rgba(0,0,0,0.03) 20px
    );
    pointer-events: none;
    z-index: 0;
  }

  @media(max-width:600px){
    header { padding: 20px; }
    .controls { padding: 16px 20px; }
    .grid { padding: 20px; gap: 16px; }
    .kanji-char { font-size: 3rem; }
  }
</style>
</head>
<body>
<div class="stripe-bg"></div>

<header>
  <div>
    <h1>漢字 <span>REF</span></h1>
    <div style="font-size:0.7rem;color:#aaa;margin-top:4px;letter-spacing:0.1em;">JLPT N5 + N4 KANJI DICTIONARY</div>
  </div>
  <div class="header-badge">286 Kanji</div>
</header>

<div class="controls">
  <button class="tab-btn active all" onclick="filter('all',this)">ALL</button>
  <button class="tab-btn n5" onclick="filter('n5',this)">N5</button>
  <button class="tab-btn n4" onclick="filter('n4',this)">N4</button>
  <div class="search-wrap">
    <input type="text" id="searchBox" placeholder="Search kanji, meaning, or word..." oninput="search()">
  </div>
  <div class="count-badge" id="countBadge">286 shown</div>
</div>

<div class="grid" id="grid"></div>

  {k:"台",r:"dai / tai",m:"Stand / Level",l:"n4",w:[{j:"台所",r:"daidokoro",e:"kitchen"},{j:"台風",r:"taifuu",e:"typhoon"},{j:"舞台",r:"butai",e:"stage"},{j:"台数",r:"daisuu",e:"number of machines"}]},
  {k:"員",r:"in",m:"Member / Staff",l:"n4",w:[{j:"社員",r:"shain",e:"company employee"},{j:"店員",r:"ten'in",e:"store clerk"},{j:"会員",r:"kaiin",e:"member"},{j:"全員",r:"zen'in",e:"all members"}]},
  {k:"業",r:"gyou / gou",m:"Business / Work",l:"n4",w:[{j:"産業",r:"sangyou",e:"industry"},{j:"卒業",r:"sotsugyou",e:"graduation"},{j:"職業",r:"shokugyou",e:"occupation"},{j:"作業",r:"sagyou",e:"work/task"}]},
  {k:"度",r:"do / tabi",m:"Degree / Time",l:"n4",w:[{j:"温度",r:"ondo",e:"temperature"},{j:"態度",r:"taido",e:"attitude"},{j:"今度",r:"kondo",e:"next time"},{j:"制度",r:"seido",e:"system/institution"}]},
  {k:"有",r:"yuu / a-",m:"Exist / Have",l:"n4",w:[{j:"有名",r:"yuumei",e:"famous"},{j:"有利",r:"yuuri",e:"advantageous"},{j:"所有",r:"shoyuu",e:"possession"},{j:"有効",r:"yuukou",e:"valid/effective"}]},
  {k:"堂",r:"dou",m:"Hall / Temple",l:"n4",w:[{j:"食堂",r:"shokudou",e:"cafeteria"},{j:"礼堂",r:"reidou",e:"chapel"},{j:"講堂",r:"koudou",e:"auditorium"},{j:"仏堂",r:"butsudou",e:"Buddhist hall"}]},
];

let current = [...KANJI];

function renderCards(data) {
  const grid = document.getElementById('grid');
  document.getElementById('countBadge').textContent = data.length + ' shown';
  if (data.length === 0) {
    grid.innerHTML = '<div class="no-results">NO RESULTS FOUND</div>';
    return;
  }
  grid.innerHTML = data.map(k => `
    <div class="card ${k.l}">
      <div class="card-top">
        <div class="kanji-char">${k.k}</div>
        <div class="card-meta">
          <div class="level-tag">${k.l.toUpperCase()}</div><br>
          <div class="romaji">${k.r}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="meaning">${k.m}</div>
        <div class="words-label">Common Words</div>
        <div class="words">
          ${k.w.map(w => `
            <div class="word-item">
              <span class="word-jp">${w.j}</span>
              <span class="word-rom">${w.r}</span>
              <span class="word-en">${w.e}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function filter(level, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const q = document.getElementById('searchBox').value.toLowerCase();
  current = level === 'all' ? KANJI : KANJI.filter(k => k.l === level);
  const filtered = q ? current.filter(k =>
    k.k.includes(q) || k.m.toLowerCase().includes(q) || k.r.toLowerCase().includes(q) ||
    k.w.some(w => w.j.includes(q) || w.e.toLowerCase().includes(q))
  ) : current;
  renderCards(filtered);
}

function search() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  const filtered = q ? current.filter(k =>
    k.k.includes(q) || k.m.toLowerCase().includes(q) || k.r.toLowerCase().includes(q) ||
    k.w.some(w => w.j.includes(q) || w.e.toLowerCase().includes(q))
  ) : current;
  renderCards(filtered);
}

// Initial render
renderCards(KANJI);
</script>
</body>
</html>
