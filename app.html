<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>漢字 MASTER</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --black:#0a0a0a; --white:#f5f0e8; --yellow:#ffe000; --red:#ff2d00;
  --blue:#00b8c4; --green:#00c853; --pink:#ff6ec7; --purple:#9b30ff;
  --border:3px solid var(--black); --shadow:4px 4px 0 var(--black);
  --shadow-lg:6px 6px 0 var(--black); --nav-h:64px; --top-h:56px;
  --safe:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--white);color:var(--black);font-family:'Space Mono',monospace;overflow-x:hidden;min-height:100vh}

/* ── TOPBAR ── */
.topbar{position:fixed;top:0;left:0;right:0;height:var(--top-h);background:var(--black);border-bottom:3px solid var(--yellow);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:200}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-back{color:var(--yellow);text-decoration:none;font-family:'Bebas Neue',sans-serif;font-size:1.6rem;line-height:1;padding:2px 8px;border:2px solid var(--yellow);transition:background 0.15s,color 0.15s}
.topbar-back:active{background:var(--yellow);color:var(--black)}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--yellow);letter-spacing:0.08em}
.topbar-title span{color:var(--red)}
.topbar-badge{background:var(--yellow);color:var(--black);font-size:0.6rem;font-weight:700;padding:3px 8px;border:2px solid var(--yellow);letter-spacing:0.08em}

/* ── CONTENT ── */
.content{padding-top:var(--top-h);padding-bottom:calc(var(--nav-h) + var(--safe) + 8px);min-height:100vh}
.tab-panel{display:none;padding:16px}
.tab-panel.active{display:block}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe));background:var(--black);border-top:3px solid var(--yellow);display:flex;padding-bottom:var(--safe);z-index:200}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;color:#666;transition:all 0.15s;padding:8px 0}
.nav-item.active{color:var(--yellow)}
.nav-icon{font-size:1.3rem;line-height:1}
.nav-label{font-size:0.55rem;letter-spacing:0.06em;text-transform:uppercase;font-family:'Space Mono',monospace}

/* ── BROWSE TAB ── */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-row{display:contents}
.filter-btn{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:0.05em;padding:7px 16px;border:var(--border);background:var(--white);cursor:pointer;box-shadow:var(--shadow);transition:all 0.1s}
.filter-btn:active{transform:translate(2px,2px);box-shadow:none}
.filter-btn.active-all{background:var(--red);color:var(--white)}
.filter-btn.active-n5{background:var(--yellow)}
.filter-btn.active-n4{background:var(--blue);color:var(--white)}
.search-box{flex:1;min-width:140px;font-family:'Space Mono',monospace;font-size:0.8rem;padding:8px 12px;border:var(--border);background:var(--white);box-shadow:var(--shadow);outline:none}
.count-tag{font-size:0.65rem;font-weight:700;background:var(--pink);color:var(--black);padding:4px 8px;border:var(--border);white-space:nowrap}

.kanji-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}
.k-card{border:var(--border);background:var(--white);box-shadow:var(--shadow-lg);position:relative;cursor:pointer;transition:all 0.12s;overflow:hidden}
.k-card:active{transform:translate(3px,3px);box-shadow:none}
.k-card.n5{--accent:var(--yellow)}
.k-card.n4{--accent:var(--blue)}
.k-card-top{background:var(--accent);padding:12px 12px 8px;border-bottom:var(--border);display:flex;align-items:flex-start;justify-content:space-between}
.k-char{font-family:'Noto Sans JP',sans-serif;font-size:2.8rem;font-weight:900;line-height:1}
.k-meta{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.level-tag{font-family:'Bebas Neue',sans-serif;font-size:0.8rem;letter-spacing:0.05em;padding:2px 7px;border:2px solid var(--black);background:var(--black);color:var(--accent)}
.k-rom{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;background:rgba(255,255,255,0.6);padding:2px 5px;border:1px solid var(--black);max-width:100px;text-align:center;word-break:break-word}
.k-body{padding:10px 12px}
.k-meaning{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:0.04em;border-left:3px solid var(--accent,var(--black));padding-left:6px;margin-bottom:6px}
.k-words{display:flex;flex-direction:column;gap:4px}
.k-word{display:flex;align-items:baseline;gap:5px;font-size:0.7rem;padding:4px 8px;border:2px solid var(--black);background:var(--white);cursor:pointer;transition:background 0.1s}
.k-word:active{background:var(--yellow)}
.k-word::before{content:"→";font-weight:700;color:var(--red);flex-shrink:0}
.k-word-jp{font-family:'Noto Sans JP',sans-serif;font-weight:700;font-size:0.85rem}
.k-word-rom{color:#555;font-size:0.6rem;flex-shrink:0}
.k-word-en{margin-left:auto;font-size:0.6rem;font-weight:700}
.speak-btn{font-size:0.65rem;background:var(--black);color:var(--yellow);border:none;padding:3px 8px;cursor:pointer;font-family:'Space Mono',monospace;letter-spacing:0.05em;margin-top:6px;display:flex;align-items:center;gap:4px}

/* ── STUDY (FLASHCARD) TAB ── */
.study-wrap{display:flex;flex-direction:column;align-items:center;gap:16px}
.study-counter{text-align:center;font-size:0.75rem;color:#666;font-family:'Space Mono',monospace}
.study-progress-wrap{width:100%;max-width:360px;height:5px;background:#ddd;border:2px solid var(--black)}
.study-progress-fill{height:100%;background:var(--yellow);transition:width 0.3s}
.flashcard{width:100%;max-width:360px;height:240px;perspective:1000px;cursor:pointer}
.flashcard-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.5s cubic-bezier(0.4,0,0.2,1)}
.flashcard.flipped .flashcard-inner{transform:rotateY(180deg)}
.fc-front,.fc-back{position:absolute;inset:0;backface-visibility:hidden;border:var(--border);box-shadow:var(--shadow-lg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:16px}
.fc-front{background:var(--white)}
.fc-back{background:var(--yellow);transform:rotateY(180deg)}
.fc-kana-big{font-family:'Noto Sans JP',sans-serif;font-size:4.5rem;font-weight:900;line-height:1}
.fc-level{font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:0.06em;background:var(--black);color:var(--yellow);padding:2px 10px}
.fc-hint{font-size:0.7rem;color:#888}
.fc-meaning{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:0.04em}
.fc-romaji{font-size:0.9rem;font-weight:700;color:#333}
.fc-example{font-family:'Noto Sans JP',sans-serif;font-size:0.85rem;color:#444;text-align:center}
.fc-actions{display:flex;gap:10px;width:100%;max-width:360px}
.fc-btn{flex:1;padding:12px;border:var(--border);font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:0.05em;cursor:pointer;box-shadow:var(--shadow);transition:all 0.1s}
.fc-btn:active{transform:translate(2px,2px);box-shadow:none}
.fc-btn-again{background:var(--red);color:var(--white)}
.fc-btn-know{background:var(--green);color:var(--white)}
.fc-speak{background:var(--black);color:var(--yellow);border:var(--border);padding:8px 20px;font-family:'Space Mono',monospace;font-size:0.75rem;cursor:pointer;box-shadow:var(--shadow);letter-spacing:0.05em}

/* ── QUIZ TAB ── */
.quiz-mode-row{display:flex;gap:8px;margin-bottom:16px}
.quiz-mode-btn{flex:1;font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:0.04em;padding:8px 4px;border:var(--border);background:var(--white);cursor:pointer;text-align:center;box-shadow:var(--shadow);transition:all 0.1s}
.quiz-mode-btn:active{transform:translate(2px,2px);box-shadow:none}
.quiz-mode-btn.active{background:var(--black);color:var(--yellow)}
.quiz-q-box{border:var(--border);background:var(--black);box-shadow:var(--shadow-lg);padding:20px;text-align:center;margin-bottom:16px}
.quiz-q-char{font-family:'Noto Sans JP',sans-serif;font-size:4rem;font-weight:900;color:var(--yellow);line-height:1;margin-bottom:6px}
.quiz-q-prompt{font-size:0.7rem;color:#aaa;font-family:'Space Mono',monospace;letter-spacing:0.06em;text-transform:uppercase}
.quiz-opts{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
.quiz-opt{padding:16px 8px;border:var(--border);background:var(--white);font-family:'Space Mono',monospace;font-size:0.85rem;cursor:pointer;text-align:center;box-shadow:var(--shadow);transition:all 0.1s;font-weight:700}
.quiz-opt:active{transform:translate(2px,2px);box-shadow:none}
.quiz-opt.correct{background:var(--green);color:var(--white);border-color:var(--green)}
.quiz-opt.wrong{background:var(--red);color:var(--white);border-color:var(--red)}
.quiz-opt.reveal{background:var(--green);color:var(--white);border-color:var(--green)}
.quiz-result-bar{padding:10px 14px;border:var(--border);font-size:0.8rem;font-weight:700;margin-top:12px;display:none}
.quiz-result-bar.correct{background:var(--green);color:var(--white)}
.quiz-result-bar.wrong{background:var(--red);color:var(--white)}
.quiz-score{text-align:center;font-size:0.75rem;color:#666;font-family:'Space Mono',monospace;margin-top:10px}

/* ── PROGRESS TAB ── */
.stat-row{display:flex;gap:10px;margin-bottom:16px}
.stat-box{flex:1;border:var(--border);background:var(--white);box-shadow:var(--shadow);padding:12px 8px;text-align:center}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:2rem;line-height:1}
.stat-num.y{color:var(--yellow);-webkit-text-stroke:1px var(--black)}
.stat-num.g{color:var(--green)}
.stat-num.r{color:var(--red)}
.stat-label{font-size:0.55rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#666;margin-top:2px}
.prog-section-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:0.06em;border-left:4px solid var(--black);padding-left:8px;margin-bottom:10px}
.kgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:20px}
.kgrid-cell{border:2px solid var(--black);background:var(--white);display:flex;flex-direction:column;align-items:center;justify-content:center;aspect-ratio:1;gap:1px;cursor:pointer;transition:all 0.15s}
.kgrid-cell .kc{font-family:'Noto Sans JP',sans-serif;font-size:1.1rem;font-weight:900}
.kgrid-cell .kr{font-size:0.45rem;font-family:'Space Mono',monospace;color:#666}
.kgrid-cell.mastered{background:var(--green);border-color:var(--green)}
.kgrid-cell.mastered .kr{color:var(--white)}
.kgrid-cell.struggling{background:var(--red);border-color:var(--red)}
.kgrid-cell.struggling .kc,.kgrid-cell.struggling .kr{color:var(--white)}
.kgrid-cell.n5c{border-color:#b8a000}
.kgrid-cell.n4c{border-color:var(--blue)}
.legend-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:0.65rem;font-family:'Space Mono',monospace}
.legend-dot{width:12px;height:12px;border:2px solid var(--black)}
.reset-btn{width:100%;border:var(--border);background:var(--white);font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:0.05em;padding:12px;cursor:pointer;box-shadow:var(--shadow);transition:all 0.1s;margin-top:8px}
.reset-btn:active{transform:translate(2px,2px);box-shadow:none}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:none;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-top:4px solid var(--black);width:100%;max-height:85vh;overflow-y:auto;padding:20px 16px;padding-bottom:calc(20px + var(--safe))}
.modal-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:var(--border)}
.modal-char{font-family:'Noto Sans JP',sans-serif;font-size:5rem;font-weight:900;line-height:1}
.modal-meta{flex:1}
.modal-level{display:inline-block;font-family:'Bebas Neue',sans-serif;font-size:0.9rem;background:var(--black);color:var(--yellow);padding:2px 10px;letter-spacing:0.06em;margin-bottom:4px}
.modal-meaning{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:0.04em}
.modal-romaji{font-size:0.8rem;color:#555;font-weight:700}
.modal-close{border:var(--border);background:var(--black);color:var(--yellow);font-family:'Bebas Neue',sans-serif;font-size:1.1rem;padding:8px 16px;cursor:pointer;box-shadow:var(--shadow);flex-shrink:0;align-self:flex-start}
.modal-section{margin-bottom:14px}
.modal-section-title{font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:0.08em;text-transform:uppercase;color:#666;margin-bottom:8px;border-left:3px solid var(--red);padding-left:6px}
.modal-words{display:flex;flex-direction:column;gap:6px}
.modal-word{display:flex;align-items:baseline;gap:8px;padding:8px 10px;border:var(--border);background:var(--white);cursor:pointer;transition:background 0.1s}
.modal-word:active{background:var(--yellow)}
.modal-word::before{content:"→";font-weight:700;color:var(--red);flex-shrink:0}
.modal-word-jp{font-family:'Noto Sans JP',sans-serif;font-weight:700;font-size:1rem}
.modal-word-rom{color:#555;font-size:0.7rem;flex-shrink:0}
.modal-word-en{margin-left:auto;font-size:0.7rem;font-weight:700}
.modal-actions{display:flex;gap:10px;margin-top:16px}
.modal-btn{flex:1;border:var(--border);font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.05em;padding:12px;cursor:pointer;box-shadow:var(--shadow);transition:all 0.1s}
.modal-btn:active{transform:translate(2px,2px);box-shadow:none}
.modal-btn-speak{background:var(--black);color:var(--yellow)}

/* ── HAMBURGER ── */
.topbar-right{display:flex;align-items:center;gap:12px}
.hamburger{display:none;flex-direction:column;justify-content:space-between;width:26px;height:20px;padding:0;background:transparent;border:none;cursor:pointer}
.hamburger span{display:block;width:100%;height:3px;background:var(--yellow);transition:transform 0.25s ease,opacity 0.2s ease;transform-origin:center}
.hamburger.open span:nth-child(1){transform:translateY(8.5px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-8.5px) rotate(-45deg)}

@media (max-width:600px){
  body[data-tab="browse"] .hamburger{display:flex}
  body[data-tab="browse"] .topbar-badge{display:none}
  #panel-browse .filter-bar{
    position:fixed;
    top:var(--top-h);
    left:0;
    right:0;
    z-index:150;
    background:var(--black);
    flex-direction:column;
    align-items:stretch;
    gap:10px;
    margin:0;
    padding:0 16px;
    max-height:0;
    overflow:hidden;
    border-bottom:0 solid var(--yellow);
    transition:max-height 0.3s ease,padding 0.3s ease,border-bottom-width 0.3s ease;
  }
  #panel-browse .filter-bar.open{
    max-height:400px;
    padding:14px 16px;
    border-bottom-width:3px;
  }
  #panel-browse .filter-bar > *{width:100%;text-align:center}
  #panel-browse .filter-bar .filter-row{display:flex;gap:8px;width:100%}
  #panel-browse .filter-bar .filter-row .filter-btn{flex:1 1 0;width:auto;padding:7px 4px}
}

/* stripe bg */
.stripe-bg{position:fixed;top:0;right:0;width:80px;height:100%;background:repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(0,0,0,0.03) 8px,rgba(0,0,0,0.03) 16px);pointer-events:none;z-index:0}

/* toast */
.toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe) + 12px);left:50%;transform:translateX(-50%);background:var(--black);color:var(--yellow);border:2px solid var(--yellow);padding:8px 18px;font-family:'Space Mono',monospace;font-size:0.75rem;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:400;white-space:nowrap;letter-spacing:0.05em}
.toast.show{opacity:1}

.no-results{grid-column:1/-1;text-align:center;padding:60px 20px;font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:#ccc}
</style>
</head>
<body>
<div class="stripe-bg"></div>

<div class="topbar">
  <div class="topbar-left">
    <a class="topbar-back" href="index.html" aria-label="Back">←</a>
    <div class="topbar-title">漢字 <span>MASTER</span></div>
  </div>
  <div class="topbar-right">
    <div class="topbar-badge">286 KANJI</div>
    <button class="hamburger" id="hamburger" aria-label="Toggle filters" aria-expanded="false" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
  </div>
</div>

<div class="content">

  <!-- ── BROWSE ── -->
  <div class="tab-panel active" id="panel-browse">
    <div class="filter-bar">
      <div class="filter-row">
        <button class="filter-btn active-all" id="fb-all" onclick="filterCards('all',this)">ALL</button>
        <button class="filter-btn" id="fb-n5" onclick="filterCards('n5',this)">N5</button>
        <button class="filter-btn" id="fb-n4" onclick="filterCards('n4',this)">N4</button>
      </div>
      <input class="search-box" id="searchBox" placeholder="Search kanji, meaning..." oninput="searchCards()">
      <div class="count-tag" id="countTag">286</div>
    </div>
    <div class="kanji-grid" id="kanjiGrid"></div>
  </div>

  <!-- ── STUDY ── -->
  <div class="tab-panel" id="panel-study">
    <div class="study-wrap">
      <div class="study-counter" id="study-counter">Card 1 of 286</div>
      <div class="study-progress-wrap"><div class="study-progress-fill" id="study-progress" style="width:0%"></div></div>
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="flashcard-inner">
          <div class="fc-front">
            <div class="fc-level" id="fc-level">N5</div>
            <div class="fc-kana-big" id="fc-char">一</div>
            <div class="fc-hint">Tap to reveal</div>
          </div>
          <div class="fc-back">
            <div class="fc-kana-big" id="fc-char-back">一</div>
            <div class="fc-meaning" id="fc-meaning">ONE</div>
            <div class="fc-romaji" id="fc-romaji">ichi / hito-</div>
            <div class="fc-example" id="fc-example">一番 — number one</div>
          </div>
        </div>
      </div>
      <button class="fc-speak" onclick="speakCurrent()">🔊 LISTEN</button>
      <div class="fc-actions">
        <button class="fc-btn fc-btn-again" onclick="markCard(false)">✕ AGAIN</button>
        <button class="fc-btn fc-btn-know" onclick="markCard(true)">✓ KNOW IT</button>
      </div>
    </div>
  </div>

  <!-- ── QUIZ ── -->
  <div class="tab-panel" id="panel-quiz">
    <div class="quiz-mode-row">
      <div class="quiz-mode-btn active" id="qm-kanji" onclick="setQuizMode('kanji')">漢字→EN</div>
      <div class="quiz-mode-btn" id="qm-meaning" onclick="setQuizMode('meaning')">EN→漢字</div>
      <div class="quiz-mode-btn" id="qm-word" onclick="setQuizMode('word')">WORD</div>
    </div>
    <div class="quiz-q-box">
      <div class="quiz-q-char" id="quiz-q-display">一</div>
      <div class="quiz-q-prompt" id="quiz-q-prompt">Pick the correct meaning</div>
    </div>
    <div class="quiz-opts" id="quiz-opts"></div>
    <div class="quiz-result-bar" id="quiz-result"></div>
    <div class="quiz-score" id="quiz-score">Score: 0 / 0</div>
  </div>

  <!-- ── PROGRESS ── -->
  <div class="tab-panel" id="panel-progress">
    <div class="stat-row">
      <div class="stat-box"><div class="stat-num g" id="s-mastered">0</div><div class="stat-label">Mastered</div></div>
      <div class="stat-box"><div class="stat-num r" id="s-struggling">0</div><div class="stat-label">Struggling</div></div>
      <div class="stat-box"><div class="stat-num y" id="s-unseen">286</div><div class="stat-label">Unseen</div></div>
    </div>
    <div class="prog-section-title">N5 KANJI</div>
    <div class="kgrid" id="prog-n5"></div>
    <div class="prog-section-title">N4 KANJI</div>
    <div class="kgrid" id="prog-n4"></div>
    <div class="legend-row">

  {k:"京",r:"kyou / kei",m:"Capital",l:"n4",w:[{j:"東京",r:"toukyou",e:"Tokyo"},{j:"京都",r:"kyouto",e:"Kyoto"},{j:"京阪",r:"keihan",e:"Kyoto-Osaka area"},{j:"上京",r:"joukyou",e:"going to Tokyo"}]},
  {k:"都",r:"to / miyako",m:"Capital City",l:"n4",w:[{j:"東京都",r:"toukyouto",e:"Tokyo Metropolis"},{j:"京都",r:"kyouto",e:"Kyoto"},{j:"首都",r:"shuto",e:"capital city"},{j:"都市",r:"toshi",e:"city"}]},
  {k:"工",r:"kou / ku",m:"Work / Craft",l:"n4",w:[{j:"工場",r:"koujou",e:"factory"},{j:"工事",r:"kouji",e:"construction"},{j:"工業",r:"kougyou",e:"industry"},{j:"工夫",r:"kufu",e:"ingenuity"}]},
  {k:"場",r:"jou / ba",m:"Place / Scene",l:"n4",w:[{j:"工場",r:"koujou",e:"factory"},{j:"場所",r:"basho",e:"place"},{j:"広場",r:"hiroba",e:"plaza"},{j:"市場",r:"ichiba",e:"market"}]},
  {k:"台",r:"dai / tai",m:"Stand / Level",l:"n4",w:[{j:"台所",r:"daidokoro",e:"kitchen"},{j:"台風",r:"taifuu",e:"typhoon"},{j:"舞台",r:"butai",e:"stage"},{j:"台数",r:"daisuu",e:"number of machines"}]},
  {k:"員",r:"in",m:"Member / Staff",l:"n4",w:[{j:"社員",r:"shain",e:"company employee"},{j:"店員",r:"ten'in",e:"store clerk"},{j:"会員",r:"kaiin",e:"member"},{j:"全員",r:"zen'in",e:"all members"}]},
  {k:"業",r:"gyou / gou",m:"Business / Work",l:"n4",w:[{j:"産業",r:"sangyou",e:"industry"},{j:"卒業",r:"sotsugyou",e:"graduation"},{j:"職業",r:"shokugyou",e:"occupation"},{j:"作業",r:"sagyou",e:"work/task"}]},
  {k:"度",r:"do / tabi",m:"Degree / Time",l:"n4",w:[{j:"温度",r:"ondo",e:"temperature"},{j:"態度",r:"taido",e:"attitude"},{j:"今度",r:"kondo",e:"next time"},{j:"制度",r:"seido",e:"system"}]},
  {k:"有",r:"yuu / a-",m:"Exist / Have",l:"n4",w:[{j:"有名",r:"yuumei",e:"famous"},{j:"有利",r:"yuuri",e:"advantageous"},{j:"所有",r:"shoyuu",e:"possession"},{j:"有効",r:"yuukou",e:"valid"}]},
  {k:"堂",r:"dou",m:"Hall / Temple",l:"n4",w:[{j:"食堂",r:"shokudou",e:"cafeteria"},{j:"礼堂",r:"reidou",e:"chapel"},{j:"講堂",r:"koudou",e:"auditorium"},{j:"仏堂",r:"butsudou",e:"Buddhist hall"}]},
];

// ── DEDUP ──
const seen = new Set();
const KANJI_UNIQUE = KANJI.filter(k => { if(seen.has(k.k)) return false; seen.add(k.k); return true; });

// ── STATE ──
let progress = JSON.parse(localStorage.getItem('kanji-progress') || '{}');
let currentFilter = 'all';
let currentSearch = '';
let cardIndex = 0;
let cardFlipped = false;
let studyDeck = [...KANJI_UNIQUE];
let quizMode = 'kanji';
let quizScore = {r:0,t:0};
let quizAnswered = false;
let currentQuiz = null;
let modalKanji = null;

// ── SPEAK ──
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP'; u.rate = 0.8;
  window.speechSynthesis.speak(u);
}

// ── NAV ──
function switchTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  document.getElementById('nav-' + tab).classList.add('active');
  document.body.dataset.tab = tab;
  if (tab !== 'browse') closeMenu();
  if (tab === 'progress') renderProgress();
}

function toggleMenu() {
  const h = document.getElementById('hamburger');
  const bar = document.querySelector('#panel-browse .filter-bar');
  const open = h.classList.toggle('open');
  bar.classList.toggle('open', open);
  h.setAttribute('aria-expanded', open);
}

function closeMenu() {
  const h = document.getElementById('hamburger');
  h.classList.remove('open');
  document.querySelector('#panel-browse .filter-bar').classList.remove('open');
  h.setAttribute('aria-expanded', 'false');
}

// ── BROWSE ──
function getFilteredKanji() {
  let pool = currentFilter === 'all' ? KANJI_UNIQUE : KANJI_UNIQUE.filter(k => k.l === currentFilter);
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    pool = pool.filter(k => k.k.includes(q) || k.m.toLowerCase().includes(q) || k.r.toLowerCase().includes(q) || k.w.some(w => w.j.includes(q) || w.e.toLowerCase().includes(q)));
  }
  return pool;
}

function renderBrowse() {
  const pool = getFilteredKanji();
  document.getElementById('countTag').textContent = pool.length;
  const grid = document.getElementById('kanjiGrid');
  if (pool.length === 0) { grid.innerHTML = '<div class="no-results">NO RESULTS</div>'; return; }
  grid.innerHTML = pool.map(k => {
    const prog = progress[k.k] || '';
    let progStyle = '';
    if (prog === 'mastered') progStyle = 'border-top:4px solid var(--green)';
    if (prog === 'struggling') progStyle = 'border-top:4px solid var(--red)';
    return `<div class="k-card ${k.l}" style="${progStyle}" onclick="openModal('${k.k}')">
      <div class="k-card-top">
        <div class="k-char">${k.k}</div>
        <div class="k-meta">
          <div class="level-tag">${k.l.toUpperCase()}</div>
          <div class="k-rom">${k.r}</div>
        </div>
      </div>
      <div class="k-body">
        <div class="k-meaning">${k.m}</div>
        <div class="k-words">
          ${k.w.slice(0,2).map(w=>`<div class="k-word" onclick="event.stopPropagation();speak('${w.j}')">
            <span class="k-word-jp">${w.j}</span>
            <span class="k-word-rom">${w.r}</span>
            <span class="k-word-en">${w.e}</span>
          </div>`).join('')}
        </div>
        <button class="speak-btn" onclick="event.stopPropagation();speak('${k.k}')">🔊 LISTEN</button>
      </div>
    </div>`;
  }).join('');
}

function filterCards(level, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.className = 'filter-btn');
  btn.classList.add('active-' + level);
  currentFilter = level;
  renderBrowse();
}

function searchCards() {
  currentSearch = document.getElementById('searchBox').value;
  renderBrowse();
}

// ── MODAL ──
function openModal(kanji) {
  const k = KANJI_UNIQUE.find(x => x.k === kanji);
  if (!k) return;
  modalKanji = k;
  document.getElementById('modal-char').textContent = k.k;
  document.getElementById('modal-level').textContent = k.l.toUpperCase();
  document.getElementById('modal-meaning').textContent = k.m;
  document.getElementById('modal-romaji').textContent = k.r;
  document.getElementById('modal-words').innerHTML = k.w.map(w =>
    `<div class="modal-word" onclick="speak('${w.j}')">
      <span class="modal-word-jp">${w.j}</span>
      <span class="modal-word-rom">${w.r}</span>
      <span class="modal-word-en">${w.e}</span>
    </div>`
  ).join('');
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

function speakModal() { if (modalKanji) speak(modalKanji.k); }

// ── STUDY ──
function renderStudyCard() {
  const k = studyDeck[cardIndex];
  cardFlipped = false;
  document.getElementById('flashcard').classList.remove('flipped');
  document.getElementById('fc-level').textContent = k.l.toUpperCase();
  document.getElementById('fc-char').textContent = k.k;
  document.getElementById('fc-char-back').textContent = k.k;
  document.getElementById('fc-meaning').textContent = k.m.toUpperCase();
  document.getElementById('fc-romaji').textContent = k.r;
  document.getElementById('fc-example').textContent = k.w[0].j + ' — ' + k.w[0].e;
  document.getElementById('study-counter').textContent = `Card ${cardIndex+1} of ${studyDeck.length}`;
  document.getElementById('study-progress').style.width = ((cardIndex+1)/studyDeck.length*100) + '%';
}

function flipCard() {
  cardFlipped = !cardFlipped;
  document.getElementById('flashcard').classList.toggle('flipped', cardFlipped);
  if (cardFlipped) speak(studyDeck[cardIndex].k);
}

function speakCurrent() { speak(studyDeck[cardIndex].k); }

function markCard(know) {
  const k = studyDeck[cardIndex];
  progress[k.k] = know ? 'mastered' : 'struggling';
  saveProgress();
  cardIndex = (cardIndex + 1) % studyDeck.length;
  renderStudyCard();
  showToast(know ? '✓ Marked as known!' : '✕ Will review again');
}

// ── QUIZ ──
function setQuizMode(mode) {
  quizMode = mode;
  document.querySelectorAll('.quiz-mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('qm-' + mode).classList.add('active');
  quizScore = {r:0,t:0};
  renderQuiz();
}

function renderQuiz() {
  quizAnswered = false;
  document.getElementById('quiz-result').style.display = 'none';
  const pool = KANJI_UNIQUE;
  currentQuiz = pool[Math.floor(Math.random() * pool.length)];
  const qDisplay = document.getElementById('quiz-q-display');
  const qPrompt = document.getElementById('quiz-q-prompt');

  if (quizMode === 'kanji') {
    qDisplay.textContent = currentQuiz.k;
    qDisplay.style.fontSize = '4rem';
    qPrompt.textContent = 'Pick the correct meaning';
  } else if (quizMode === 'meaning') {
    qDisplay.textContent = currentQuiz.m;
    qDisplay.style.fontSize = '1.8rem';
    qPrompt.textContent = 'Pick the correct kanji';
  } else {
    const word = currentQuiz.w[Math.floor(Math.random()*currentQuiz.w.length)];
    currentQuiz._word = word;
    qDisplay.textContent = word.j;
    qDisplay.style.fontSize = '2rem';
    qPrompt.textContent = 'What does this word mean?';
  }

  let opts = [currentQuiz];
  while (opts.length < 4) {
    const rand = pool[Math.floor(Math.random()*pool.length)];
    if (!opts.find(o => o.k === rand.k)) opts.push(rand);
  }
  opts = opts.sort(() => Math.random() - 0.5);

  const container = document.getElementById('quiz-opts');
  container.innerHTML = '';
  opts.forEach(opt => {
    const btn = document.createElement('div');
    btn.className = 'quiz-opt';
    if (quizMode === 'kanji') btn.textContent = opt.m;
    else if (quizMode === 'meaning') btn.textContent = opt.k;
    else btn.textContent = (opt.k === currentQuiz.k && currentQuiz._word) ? currentQuiz._word.e : opt.w[0].e;
    btn.onclick = () => checkQuiz(btn, opt.k === currentQuiz.k);
    container.appendChild(btn);
  });
  document.getElementById('quiz-score').textContent = `Score: ${quizScore.r} / ${quizScore.t}`;
}

function checkQuiz(btn, correct) {
  if (quizAnswered) return;
  quizAnswered = true;
  quizScore.t++;
  if (correct) { btn.classList.add('correct'); quizScore.r++; progress[currentQuiz.k] = 'mastered'; speak(currentQuiz.k); }
  else {
    btn.classList.add('wrong');
    progress[currentQuiz.k] = 'struggling';
    const correctVal = quizMode === 'kanji' ? currentQuiz.m : quizMode === 'meaning' ? currentQuiz.k : (currentQuiz._word ? currentQuiz._word.e : currentQuiz.w[0].e);
    document.querySelectorAll('.quiz-opt').forEach(b => { if (b.textContent === correctVal) b.classList.add('reveal'); });
  }
  saveProgress();
  const res = document.getElementById('quiz-result');
  res.style.display = 'block';
  res.className = 'quiz-result-bar ' + (correct ? 'correct' : 'wrong');
  res.textContent = correct ? `✓ Correct! ${currentQuiz.k} = ${currentQuiz.m}` : `✕ It was: ${currentQuiz.k} = ${currentQuiz.m}`;
  document.getElementById('quiz-score').textContent = `Score: ${quizScore.r} / ${quizScore.t}`;
  setTimeout(renderQuiz, 1500);
}

// ── PROGRESS ──
function renderProgress() {
  const mastered = Object.values(progress).filter(v=>v==='mastered').length;
  const struggling = Object.values(progress).filter(v=>v==='struggling').length;
  const unseen = KANJI_UNIQUE.length - mastered - struggling;
  document.getElementById('s-mastered').textContent = mastered;
  document.getElementById('s-struggling').textContent = struggling;
  document.getElementById('s-unseen').textContent = unseen;

  ['n5','n4'].forEach(level => {
    const grid = document.getElementById('prog-' + level);
    const pool = KANJI_UNIQUE.filter(k => k.l === level);
    grid.innerHTML = pool.map(k => {
      const p = progress[k.k] || '';
      return `<div class="kgrid-cell ${p} ${level}c" onclick="speak('${k.k}')">
        <span class="kc">${k.k}</span>
        <span class="kr">${k.m.split('/')[0].trim().toLowerCase()}</span>
      </div>`;
    }).join('');
  });
}

function resetProgress() {
  if (confirm('Reset all progress?')) { progress = {}; saveProgress(); renderProgress(); showToast('Progress reset!'); }
}

function saveProgress() { localStorage.setItem('kanji-progress', JSON.stringify(progress)); }

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ── INIT ──
document.body.dataset.tab = 'browse';
renderBrowse();
renderStudyCard();
renderQuiz();
</script>
</body>
</html>
